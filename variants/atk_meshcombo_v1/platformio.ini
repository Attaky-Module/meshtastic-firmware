[env:atk_meshcombo_v1]
extends = esp32s3_base
board = atk-meshcombo-v1
board_check = extra
board_build.partitions = default_16MB.csv
upload_protocol = esptool

build_flags = ${esp32s3_base.build_flags} 
  -DPRIVATE_HW 
  -DBOARD_HAS_PSRAM
  -DGPS_POWER_TOGGLE
  -Ivariants/atk_meshcombo_v1

lib_deps = ${esp32s3_base.lib_deps}
	lovyan03/LovyanGFX@^1.2.0
  earlephilhower/ESP8266Audio@^1.9.9
  earlephilhower/ESP8266SAM@^1.0.1


[env:atk_meshcombo_v1_tft]
extends = env:atk_meshcombo_v1
upload_speed = 460800

build_flags =
  ${env:atk_meshcombo_v1.build_flags}
 ; -DARDUINO_USB_CDC_ON_BOOT=0
  -D CONFIG_DISABLE_HAL_LOCKS=0 ; "feels" to be a bit more stable without locks
  -D INPUTDRIVER_BUTTON_TYPE=38
  -D INPUTDRIVER_I2C_KBD_TYPE=0x55
  -D MESHTASTIC_EXCLUDE_INPUTBROKER=1
  -D HAS_SCREEN=1
  -D HAS_TFT=1
  -D RAM_SIZE=5120
	-D LV_LVGL_H_INCLUDE_SIMPLE
	-D LV_CONF_INCLUDE_SIMPLE
	-D LV_COMP_CONF_INCLUDE_SIMPLE
  -D LV_USE_SYSMON=0
  -D LV_USE_PROFILER=0
  -D LV_USE_PERF_MONITOR=0
  -D LV_USE_MEM_MONITOR=0
  -D LV_USE_LOG=0
  -D USE_LOG_DEBUG
  -D LOG_DEBUG_INC=\"DebugConfiguration.h\"
  -D RADIOLIB_DEBUG_BASIC=0
  -D RADIOLIB_DEBUG_SPI=0
  -D RADIOLIB_DEBUG_PROTOCOL=0
  -D RADIOLIB_SPI_PARANOID=0
  -D CALIBRATE_TOUCH=1
  -D LGFX_SCREEN_WIDTH=240
  -D LGFX_SCREEN_HEIGHT=320
  -D DISPLAY_SIZE=320x240 ; landscape mode
  -D LGFX_DRIVER_TEMPLATE
  -D LGFX_DRIVER=LGFX_GENERIC
  -D GFX_DRIVER_INC=\"graphics/LGFX/LGFX_GENERIC.h\"
  -D LGFX_PIN_SCK=11
  -D LGFX_PIN_MOSI=13
  -D LGFX_PIN_MISO=-1
  -D LGFX_PIN_DC=12
  -D LGFX_PIN_CS=45
  -D LGFX_PIN_RST=10
  -D LGFX_PIN_BL=14
  -D LGFX_TOUCH_INT=-1
  -D LGFX_TOUCH=FT5x06
  -D LGFX_TOUCH_I2C_FREQ=400000
  -D LGFX_TOUCH_I2C_PORT=0
  -D LGFX_TOUCH_I2C_ADDR=0x38
  -D LGFX_TOUCH_I2C_SDA=2
  -D LGFX_TOUCH_I2C_SCL=1
  -D LGFX_TOUCH_RST=-1
  -D SPI_FREQUENCY=60000000
  -D LGFX_PANEL=ST7789
  -D LGFX_INVERT_COLOR=true
  -D LGFX_ROTATION=3
  -D LGFX_TOUCH_ROTATION=0
  -D LGFX_HAS_BUTTON=1
  -D VIEW_320x240
;	-D USE_DOUBLE_BUFFER
  -D USE_PACKET_API
  -D MAP_FULL_REDRAW
  -D ATK_BATTERY_EN=1

lib_deps =
  ${env:atk_meshcombo_v1.lib_deps}
  # Attaky fork of meshtastic-device-ui (carries the I2C keyboard
  # overlay for the ATK-MeshCombo-V1 keyboard layout). Pinned to the
  # commit SHA below; bump in lockstep with new Attaky-Module fork releases.
  https://github.com/Attaky-Module/meshtastic-device-ui/archive/4fead76d9d62433e91294611a895e07b9b789daa.zip







